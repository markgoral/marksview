<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Support/Contact - ActionTree and TimeVerse iOS apps</title>
<meta name="description" content="Please submit any comments, questions or suggestions here - Thanks!">
<meta property="og:title" content="Support/Contact">
<meta property="og:site_name" content="ActionTree and TimeVerse iOS apps">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="site-header">
  <div class="nav-bar">
    <button class="nav-toggle" aria-label="Toggle navigation">&#9776;</button>
    <ul class="nav-links">
      <li><a href="index.html">TimeVerse</a></li>
      <li><a href="actiontree.html">ActionTree</a></li>
      <li><a href="tutorial-videos.html">Tutorial Videos</a></li>
      <li><a href="privacy-policy.html">Privacy Policy</a></li>
      <li><a href="contact.html" class="active">Support/Contact</a></li>
    </ul>
    <div class="nav-social">
      Follow: <a href="https://twitter.com/MarkGoral" target="_blank" rel="noopener">@MarkGoral</a>
    </div>
  </div>
</header>

<main class="container">

  <section class="hero">
    <h1>Contact Form</h1>
    <p class="tagline">Please submit any comments, questions, or suggestions here — thanks!</p>
  </section>

  <section>
    <div class="card">
      <!--
        This form uses Formspree (https://formspree.io) to deliver submissions to your
        email without needing your own server. Sign up for a free account, create a
        form, and replace YOUR_FORM_ID below with the ID Formspree gives you.
        See README.md in this folder for step-by-step setup instructions.
      -->
      <form class="contact-form" action="https://formspree.io/f/YOUR_FORM_ID" method="POST">
        <p class="form-note"><span class="required">*</span> indicates a required field</p>

        <div class="form-row">
          <div class="form-group">
            <label for="first-name">First <span class="required">*</span></label>
            <input type="text" id="first-name" name="first_name" required>
          </div>
          <div class="form-group">
            <label for="last-name">Last</label>
            <input type="text" id="last-name" name="last_name">
          </div>
        </div>

        <div class="form-group">
          <label for="email">Email <span class="required">*</span></label>
          <input type="email" id="email" name="_replyto" required>
        </div>

        <div class="form-group">
          <label for="comment">Comment <span class="required">*</span></label>
          <textarea id="comment" name="comment" required></textarea>
        </div>

        <input type="hidden" name="_subject" value="New message from marksview.com contact form">

        <button type="submit" class="btn">Submit</button>
      </form>
    </div>
  </section>

</main>

<footer class="site-footer">
  <div class="container">
    <p>&copy; <span id="year"></span> Mark Goral &mdash; ActionTree &amp; TimeVerse iOS apps &middot; <a href="https://twitter.com/MarkGoral" target="_blank" rel="noopener">@MarkGoral</a></p>
  </div>
</footer>

<script src="js/main.js"></script>
<script>document.getElementById("year").textContent = new Date().getFullYear();</script>
</body>
</html>
